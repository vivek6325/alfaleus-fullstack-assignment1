<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Syncpad Task Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="brand">
        <span class="logo">■</span>
        <h2>SYNCPAD</h2>
      </div>
      <span id="connection-status" class="status-badge status-offline">Connecting...</span>
    </div>

    <form id="clip-form">
      <div class="form-group">
        <label for="board-select">Select Workspace Board</label>
        <select id="board-select" required>
          <option value="" disabled selected>Loading boards...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="column-select">Target Column</label>
        <select id="column-select" required>
          <option value="Todo">To Do</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <div class="form-group">
        <label for="task-title">Task Title</label>
        <input type="text" id="task-title" required placeholder="Enter task name...">
      </div>

      <div class="form-group">
        <label for="task-desc">Description / URL</label>
        <textarea id="task-desc" rows="3" placeholder="Enter task details or notes..."></textarea>
      </div>

      <div class="form-group">
        <label for="task-assignee">Assignee</label>
        <input type="text" id="task-assignee" placeholder="e.g. Alice (Optional)">
      </div>

      <button type="submit" id="submit-btn" disabled>Clip to Kanban</button>
    </form>
    
    <div id="feedback-message" class="feedback-msg hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
